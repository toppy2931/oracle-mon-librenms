# =============================================================================
# Oracle DataGuard SNMP Extend 設定
# 加入到 Oracle 主機的 /etc/snmp/snmpd.conf
# =============================================================================

# ── 基本 SNMP 設定（若尚未設定）──────────────────────────────────────────
# 允許 LibreNMS poller 主機讀取（替換 <POLLER_IP> 為實際 IP）
rocommunity librenms_snmp <POLLER_IP>
# 或允許整個子網
# rocommunity librenms_snmp 192.168.1.0/24

# ── Oracle DataGuard Extend ───────────────────────────────────────────────
# 語法：extend <name> <script_path>
# name 長度限制 255 字，建議使用 ASCII 無空格
extend oracle-dg /etc/snmp/oracle_dg.sh

# 若同一台主機有多個 Oracle SID（如 primary + 另一個 standby），
# 可建立不同 SID 的腳本：
# extend oracle-dg-ora1 /etc/snmp/oracle_dg_ORA1.sh
# extend oracle-dg-ora2 /etc/snmp/oracle_dg_ORA2.sh

# ── 讓 snmpd 能執行腳本（Oracle OS 認證需要）─────────────────────────────
# 以下設定讓 snmpd 以特定使用者身份執行 extend 腳本
# 方法 A：snmpd 使用者加入 dba group（推薦）
#   usermod -a -G dba Debian-snmp    # Debian/Ubuntu
#   usermod -a -G dba snmpd          # RHEL/CentOS
#   systemctl restart snmpd
#
# 方法 B：使用 sudo（若無法加 group）
#   在 /etc/sudoers.d/snmpd-oracle 加入：
#   Debian-snmp ALL=(oracle) NOPASSWD: /etc/snmp/oracle_dg.sh
#   然後修改腳本第一行改為 sudo -u oracle 執行 sqlplus

# =============================================================================
# 驗證設定：
#   snmpwalk -v2c -c librenms_snmp localhost .1.3.6.1.4.1.8072.1.3.2
# 應看到 oracle-dg 的 12 行輸出
# =============================================================================
